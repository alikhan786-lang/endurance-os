<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENDURANCE OS</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#0a0d0b;--panel:#111411;--panel2:#161a16;--line:#1e2b1f;
  --ink:#e4ece5;--dim:#7a9480;--faint:#4a6050;
  --accent:#6fcf7f;--accent2:#3a9e52;--warn:#e8b84b;--bad:#e0604a;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:20px 14px 80px}
/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.logo{font-weight:700;letter-spacing:3px;font-size:17px}.logo span{color:var(--accent)}
.logo-sub{font-size:10px;color:var(--faint);letter-spacing:2px;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--accent)}.sync-dot.err{background:var(--bad)}.sync-dot.loading{background:var(--warn)}
.sync-label{font-size:10px;color:var(--faint);letter-spacing:1px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent2);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--accent);flex-shrink:0}
/* TABS */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:7px 11px;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-radius:var(--radius);transition:all .12s;white-space:nowrap}
.tab.active{color:var(--bg);background:var(--accent);border-color:var(--accent);font-weight:700}
.tab:disabled{opacity:.3;cursor:not-allowed}
/* PANELS */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;margin-bottom:14px}
h2{font-size:12px;letter-spacing:2px;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
h3{font-size:11px;letter-spacing:1px;color:var(--warn);margin:14px 0 8px;text-transform:uppercase}
p,li{color:var(--dim);line-height:1.7;font-size:12px}
ul{padding-left:16px;margin:5px 0}
.note{border-left:3px solid var(--warn);background:var(--panel2);padding:9px 13px;border-radius:0 var(--radius) var(--radius) 0;font-size:11px;color:var(--dim);line-height:1.6;margin:9px 0}
.note.ok{border-left-color:var(--accent)}
table{width:100%;border-collapse:collapse;margin:7px 0}
td,th{border:1px solid var(--line);padding:7px 9px;font-size:11px;text-align:left;color:var(--dim)}
th{color:var(--accent);letter-spacing:1px;font-size:10px;text-transform:uppercase}
.hidden{display:none}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:11px}
.stat .lab{font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase}
.stat .val{font-size:19px;font-weight:700;margin-top:4px}
.good{color:var(--accent)}.mid{color:var(--warn)}.low{color:var(--bad)}
/* BUTTONS */
.btn{background:var(--accent);color:var(--bg);border:none;padding:10px 18px;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:var(--radius);transition:opacity .12s}
.btn:hover{opacity:.85}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}
.btn.sm{padding:6px 11px;font-size:10px}
.btn.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
/* INPUTS */
input[type=number],input[type=text],input[type=date],select,textarea{background:var(--bg);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:13px;padding:8px 10px;border-radius:var(--radius);width:100%;margin-top:5px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select option{background:var(--panel2)}
/* USER CARDS */
.user-card{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px 15px;margin-bottom:9px;cursor:pointer;transition:border-color .12s}
.user-card:hover{border-color:var(--accent)}
.av2{width:40px;height:40px;border-radius:50%;background:var(--accent2);color:#fff;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-card .uname{font-size:13px;color:var(--ink)}
.user-card .umeta{font-size:10px;color:var(--faint);margin-top:2px}
.user-card .udel{margin-left:auto;background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:3px 7px}
.user-card .udel:hover{color:var(--bad)}
/* GENDER TAGS */
.f-tag{display:inline-block;background:#2a1f2e;border:1px solid #6b3fa0;color:#c084fc;font-size:9px;letter-spacing:1px;padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle}
.m-tag{display:inline-block;background:#1a2535;border:1px solid #3b6ea0;color:#60a5fa;font-size:9px;letter-spacing:1px;padding:1px 6px;border-radius:3px;margin-left:5px;vertical-align:middle}
/* WORKOUT MENU */
.cat-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 13px;background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:2px}
.cat-header .cname{font-size:11px;letter-spacing:1px;color:var(--ink);font-weight:700;flex:1}
.ex-list{border:1px solid var(--line);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;margin-bottom:6px}
.ex-row{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--panel2);border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.ex-row:last-child{border-bottom:none}
.ex-row:hover,.ex-row.sel{background:#192819}
.ex-row.sel{border-left:3px solid var(--accent)}
.ex-code{font-size:9px;color:var(--faint);width:32px;flex-shrink:0;letter-spacing:1px}
.ex-name{flex:1;font-size:12px;color:var(--ink)}
.ex-add{font-size:16px;color:var(--faint)}
.ex-row:hover .ex-add,.ex-row.sel .ex-add{color:var(--accent)}
/* SELECTED EXERCISES */
.sel-ex{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:11px;margin-bottom:9px}
.sel-ex-name{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:7px}
.set-row{display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.set-row input{max-width:75px;margin-top:0}
.set-label{font-size:10px;color:var(--faint);letter-spacing:1px;white-space:nowrap}
.rm-btn{background:none;border:none;color:var(--faint);font-size:15px;cursor:pointer;padding:0 3px;line-height:1}
.rm-btn:hover{color:var(--bad)}
/* WORKOUT LOG */
.wlog-entry{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:9px}
.wlog-date{font-size:10px;color:var(--faint);letter-spacing:1px;margin-bottom:5px}
.wlog-name{font-size:13px;color:var(--ink);font-weight:700;margin-bottom:7px}
.wlog-ex{font-size:11px;color:var(--dim);margin-bottom:2px}
.wlog-vol{font-size:10px;color:var(--faint);margin-top:5px;padding-top:5px;border-top:1px solid var(--line)}
.pr-badge{display:inline-block;background:#1a2a1a;border:1px solid var(--accent);color:var(--accent);font-size:9px;letter-spacing:1px;padding:1px 5px;border-radius:3px;margin-left:5px}
/* MEASUREMENTS */
.mrow{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.mrow:last-child{border-bottom:none}
.mlabel{width:90px;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.mval{font-size:13px;color:var(--ink);width:70px}
.mbar-wrap{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden;min-width:50px}
.mbar-fill{height:100%;border-radius:3px}
/* MACRO BAR */
.macro-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;margin:7px 0}
.mp{background:var(--accent)}.mc{background:var(--warn)}.mf{background:var(--bad)}
/* AI COACH */
.ai-bubble{background:var(--panel2);border:1px solid var(--accent);border-radius:var(--radius);padding:14px;margin-bottom:10px;line-height:1.7;font-size:12px;color:var(--dim);white-space:pre-wrap}
.ai-thinking{color:var(--faint);font-style:italic;font-size:11px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.ai-label{font-size:10px;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px}
/* ASSESSMENT */
.q-text{font-size:14px;color:var(--ink);margin-bottom:16px;line-height:1.5}
.q-num{color:var(--faint);font-size:10px;letter-spacing:2px;margin-bottom:7px}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:11px 14px;margin-bottom:7px;cursor:pointer;font-family:var(--mono);font-size:12px;border-radius:var(--radius);transition:all .12s}
.opt:hover{border-color:var(--accent);background:#192819}
.bar{height:3px;background:var(--panel2);border-radius:2px;margin-bottom:18px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent);transition:width .25s}
.gbtn{flex:1;min-width:110px;padding:14px 10px;background:var(--panel2);border:2px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:12px;border-radius:8px;cursor:pointer;text-align:center;transition:all .15s}
.gbtn:hover,.gbtn.sel{border-color:var(--accent);background:#192819;color:var(--accent)}
.gbtn .gicon{font-size:24px;display:block;margin-bottom:5px}
/* FOOD */
.food-chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 10px;margin:2px;font-size:11px;color:var(--ink);cursor:pointer}
.food-chip:hover{border-color:var(--accent)}
.cat-btn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:5px 11px;font-family:var(--mono);font-size:10px;border-radius:20px;cursor:pointer;margin:2px}
.cat-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:11px}
.log-entry:last-child{border-bottom:none}
.log-rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;padding:0 3px}
.log-rm:hover{color:var(--bad)}
/* DAY NAV */
.day-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:11px}
.day-btn{background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:5px 9px;cursor:pointer;font-family:var(--mono);font-size:10px;border-radius:var(--radius)}
.day-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.task{display:flex;gap:9px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:7px;cursor:pointer}
.task.done{opacity:.4}
.task .box{width:16px;height:16px;border:1px solid var(--faint);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:11px}
.task .t-tag{font-size:9px;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.task .t-name{color:var(--ink);font-size:12px;margin:2px 0}
.task .t-det{color:var(--dim);font-size:11px;line-height:1.5}
/* MEAS COMPARE */
.meas-compare-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);flex-wrap:wrap}
.meas-compare-row:last-child{border-bottom:none}
@media(max-width:600px){.wrap{padding:12px 9px 60px}.panel{padding:13px}.tabs{gap:3px}.tab{padding:6px 8px;font-size:9px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo">ENDURANCE<span>_OS</span></div>
      <div class="logo-sub">PERFORMANCE · FITNESS · COACHING</div>
    </div>
    <div class="hdr-right">
      <div class="sync-dot" id="syncDot"></div>
      <span class="sync-label" id="syncLabel">CONNECTING…</span>
      <span id="authEmail" style="font-size:10px;color:var(--faint);letter-spacing:1px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <div class="avatar" id="headerAvatar" onclick="switchUser()" title="Switch user">?</div>
      <button id="signOutBtn" style="background:none;border:1px solid var(--line);color:var(--faint);font-family:var(--mono);font-size:10px;padding:5px 9px;border-radius:var(--radius);cursor:pointer;letter-spacing:1px" title="Sign out">⏻</button>
    </div>
  </header>

  <!-- LOGIN SCREEN -->
  <div id="view-login" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
    <div class="panel" style="max-width:380px;width:100%;text-align:center;padding:32px 24px">
      <div class="logo" style="font-size:22px;margin-bottom:6px">ENDURANCE<span>_OS</span></div>
      <div class="logo-sub" style="margin-bottom:28px">PRIVATE — AUTHORISED ACCESS ONLY</div>
      <div id="loginStatus" style="color:var(--faint);font-size:11px;margin-bottom:20px;min-height:16px"></div>
      <button id="googleSignInBtn" style="display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);font-family:var(--mono);font-size:12px;letter-spacing:1px;padding:14px 20px;border-radius:var(--radius);cursor:pointer;transition:border-color .12s">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.48A4.8 4.8 0 0 1 4.5 7.5V5.43H1.83a8 8 0 0 0 0 7.12z"/><path fill="#EA4335" d="M8.98 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.46.9 11.65 0 8.98 0A8 8 0 0 0 1.83 5.43L4.5 7.5a4.77 4.77 0 0 1 4.48-3.92z"/></svg>
        SIGN IN WITH GOOGLE
      </button>
      <div id="loginErr" style="color:var(--bad);font-size:11px;margin-top:12px;min-height:16px"></div>
    </div>
  </div>

  <!-- USER SCREEN -->
  <div id="view-users">
    <div class="panel" style="max-width:480px;margin:40px auto">
      <h2>WHO'S TRAINING TODAY?</h2>
      <div id="userList"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="view-app" class="hidden">
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-view="workout" id="tabWorkout">WORKOUT</button>
      <button class="tab" data-view="history" id="tabHistory">HISTORY</button>
      <button class="tab" data-view="prs" id="tabPrs">PRs</button>
      <button class="tab" data-view="measurements" id="tabMeasurements">BODY</button>
      <button class="tab" data-view="nutrition" id="tabNutrition">DIET</button>
      <button class="tab" data-view="sleep" id="tabSleep">SLEEP</button>
      <button class="tab" data-view="coach" id="tabCoach">AI COACH</button>
      <button class="tab" data-view="plan" id="tabPlan">PLAN</button>
      <button class="tab" data-view="assess" id="tabAssess">ASSESSMENT</button>
    </div>
    <div id="view-workout"></div>
    <div id="view-history" class="hidden"></div>
    <div id="view-prs" class="hidden"></div>
    <div id="view-measurements" class="hidden"></div>
    <div id="view-nutrition" class="hidden"></div>
    <div id="view-sleep" class="hidden"></div>
    <div id="view-coach" class="hidden"></div>
    <div id="view-plan" class="hidden"></div>
    <div id="view-assess" class="hidden"></div>
  </div>
</div>

<script>
// ── FIREBASE INIT ─────────────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyA6ervN6Yvr5jWJgdYiTKuTlT57-sU0vtA",
  authDomain:"endurance-os-a1d05.firebaseapp.com",
  databaseURL:"https://endurance-os-a1d05-default-rtdb.firebaseio.com",
  projectId:"endurance-os-a1d05",
  storageBucket:"endurance-os-a1d05.firebasestorage.app",
  messagingSenderId:"432521172254",
  appId:"1:432521172254:web:9e663b44da102f6d41e50f"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

// ── ACCESS CONTROL — only these two emails ────────────────────────────────────
const ALLOWED_EMAILS=['alikhan786@gmail.com','zaraali86@gmail.com'];
let currentAuthUser=null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
window.signIn=function(){
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginStatus').textContent='Opening Google sign-in…';
  const provider=new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({prompt:'select_account'});
  auth.signInWithPopup(provider).catch(e=>{
    document.getElementById('loginStatus').textContent='';
    document.getElementById('loginErr').textContent='Sign-in failed: '+e.message;
  });
};
window.signOut=function(){
  if(!confirm('Sign out?'))return;
  auth.signOut();
};

auth.onAuthStateChanged(user=>{
  if(user){
    const email=user.email.toLowerCase();
    if(!ALLOWED_EMAILS.includes(email)){
      auth.signOut();
      document.getElementById('view-login').style.display='flex';
      document.getElementById('view-users').classList.add('hidden');
      document.getElementById('view-app').classList.add('hidden');
      document.getElementById('loginErr').textContent='Access denied — this app is private.';
      document.getElementById('loginStatus').textContent='';
      return;
    }
    currentAuthUser=user;
    document.getElementById('authEmail').textContent=email;
    document.getElementById('view-login').style.display='none';
    setSyncStatus('ok');
    loadUsers();
  } else {
    currentAuthUser=null;
    document.getElementById('view-login').style.display='flex';
    document.getElementById('view-users').classList.add('hidden');
    document.getElementById('view-app').classList.add('hidden');
    document.getElementById('headerAvatar').textContent='?';
    document.getElementById('authEmail').textContent='';
    document.getElementById('loginStatus').textContent='';
    setSyncStatus('err');
  }
});

// ── CONFIG ────────────────────────────────────────────────────────────────────
const TODAY=new Date().toISOString().slice(0,10);
const DAYNAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
document.querySelector('header .hdr-right').insertAdjacentHTML('afterbegin',
  `<span class="sync-label" style="margin-right:auto">${new Date().toDateString().toUpperCase()}</span>`);

// ── FIREBASE HELPERS (auth-token bearing) ─────────────────────────────────────
function setSyncStatus(s){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  if(!dot)return;
  dot.className='sync-dot '+(s==='ok'?'ok':s==='err'?'err':'loading');
  lbl.textContent=s==='ok'?'SYNCED':s==='err'?'OFFLINE':'SYNCING…';
}

// Use Firebase SDK directly (handles auth token automatically)
async function fbSet(path,data){
  setSyncStatus('loading');
  try{await db.ref(path).set(data);setSyncStatus('ok');return true;}
  catch(e){setSyncStatus('err');console.error(e);return false;}
}
async function fbPush(path,data){
  setSyncStatus('loading');
  try{const ref=await db.ref(path).push(data);setSyncStatus('ok');return ref.key;}
  catch(e){setSyncStatus('err');return null;}
}
async function fbGet(path){
  try{
    const snap=await db.ref(path).get();
    setSyncStatus('ok');return snap.exists()?snap.val():null;
  }catch(e){setSyncStatus('err');return null;}
}
async function fbDelete(path){
  setSyncStatus('loading');
  try{await db.ref(path).remove();setSyncStatus('ok');return true;}
  catch(e){setSyncStatus('err');return false;}
}

// ── LOCAL FALLBACK ────────────────────────────────────────────────────────────
const _lm={};
const ls={
  get(k){try{return localStorage.getItem(k);}catch(e){return _lm[k]??null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){_lm[k]=v;}}
};

// ── USERS ─────────────────────────────────────────────────────────────────────
let users=[];
let currentUID=null;
function getUser(){return users.find(u=>u.id===currentUID);}
function uk(k){return `users/${currentUID}/${k}`;}

async function loadUsers(){
  const data=await fbGet('users');
  if(data){
    users=Object.entries(data).map(([id,u])=>({id,...u})).filter(u=>u.name);

async function renderUserScreen(){
  document.getElementById('view-users').classList.remove('hidden');
  document.getElementById('view-app').classList.add('hidden');
  document.getElementById('headerAvatar').textContent='?';
  const el=document.getElementById('userList');
  el.innerHTML='<div style="color:var(--faint);font-size:11px;margin-bottom:12px">Loading users…</div>';
  if(!users.length){
    el.innerHTML='<p style="color:var(--faint);margin-bottom:14px;font-size:12px">No users yet — add yourself below.</p>';
  } else {
    const cards=await Promise.all(users.map(async u=>{
      const wData=await fbGet(`users/${u.id}/workouts`);
      const wCount=wData?Object.keys(wData).length:0;
      const gTag=u.gender==='F'?'<span class="f-tag">FEMALE</span>':u.gender==='M'?'<span class="m-tag">MALE</span>':'';
      return `<div class="user-card" onclick="selectUser('${u.id}')">
        <div class="av2">${u.name[0].toUpperCase()}</div>
        <div><div class="uname">${u.name}${gTag}</div>

        </div>
        <button class="udel" onclick="delUser(event,'${u.id}')">×</button>
      </div>`;
    }));
    el.innerHTML=cards.join('');
  }
  el.innerHTML+=`
    <div style="margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1;min-width:130px"><input type="text" id="newName" placeholder="Your name" maxlength="30" style="margin-top:0" onkeydown="if(event.key==='Enter')addUser()"></div>
      <button class="btn" onclick="addUser()">+ ADD USER</button>
    </div>
    <div id="userErr" style="color:var(--bad);font-size:11px;margin-top:5px"></div>`;
}

window.addUser=async function(){
  const n=(document.getElementById('newName')?.value||'').trim();
  if(!n){document.getElementById('userErr').textContent='Enter a name.';return;}
  const id='u'+Date.now();
  await fbSet(`users/${id}`,{name:n,gender:null,createdAt:TODAY});
  users.push({id,name:n,gender:null});
  selectUser(id);
};
window.selectUser=function(id){
  currentUID=id;
  const u=getUser();
  document.getElementById('headerAvatar').textContent=u.name[0].toUpperCase();
  document.getElementById('view-users').classList.add('hidden');
  document.getElementById('view-app').classList.remove('hidden');
  show('workout');renderWorkout();
};
window.delUser=async function(e,id){
  e.stopPropagation();
  if(!confirm('Delete this user and ALL their data from the shared database?'))return;
  await fbDelete(`users/${id}`);
  users=users.filter(u=>u.id!==id);
  renderUserScreen();
};

function calcVol(ex){
  if(!ex.sets||!ex.sets.length)return 0;
  if(ex.type==='duration')return ex.sets.reduce((t,s)=>t+(+s.mins||0),0);
  return ex.sets.reduce((t,s)=>t+((+s.reps||0)*(+s.weight||0)),0);
}

// Figure out next cycle day from workout history
async function getNextCycleDay(){
  const data=await fbGet(uk('workouts'));
  if(!data)return 1;
  const sessions=Object.values(data).sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
  const last=sessions[0];
  if(!last||!last.cycleDay)return 1;
  const next=last.cycleDay>=4?1:last.cycleDay+1;
  return next;
}

async function renderWorkout(){
  const el=document.getElementById('view-workout');
  el.innerHTML=`<div class="panel"><div class="ai-thinking">Loading your next session…</div></div>`;
  const nextDay=await getNextCycleDay();
  const tmpl=TEMPLATES.find(t=>t.cycleDay===nextDay)||TEMPLATES[0];
  // Load last session weights for this cycleDay to pre-fill
  const data=await fbGet(uk('workouts'));
  let lastSameDay=null;
  if(data){
    const sessions=Object.values(data)
      .filter(s=>s.cycleDay===nextDay)
      .sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
    lastSameDay=sessions[0]||null;
  }
  // Build active session from template, override weights from last same-day session
  activeSession={
    date:TODAY,
    cycleDay:tmpl.cycleDay,
    name:tmpl.label,
    notes:'',
    exercises: tmpl.exercises.map(te=>{
      const exInfo=EX_LIB[te.code]||{name:te.code,type:'sets'};
      // find same exercise from last same-day session
      const lastEx=lastSameDay?.exercises?.find(e=>e.code===te.code);
      const sets=(lastEx?.sets||te.sets).map(s=>({...s}));
      return {code:te.code, name:exInfo.name, type:exInfo.type, cue:exInfo.cue, sets};
    })
  };
  renderWorkoutForm(tmpl, lastSameDay);
}

window.sv=function(ei,si,k,v){if(activeSession?.exercises[ei])activeSession.exercises[ei].sets[si][k]=+v||v;};
window.addSet=function(ei){activeSession.exercises[ei].sets.push({reps:'',weight:''});const el=document.getElementById('exFormList');if(el)el.innerHTML=activeSession.exercises.map((_,i)=>i).reduce((h,i)=>h,renderExForms());renderWorkout();};
window.rmSet=function(ei,si){activeSession.exercises[ei].sets.splice(si,1);renderWorkout();};
window.rmEx=function(ei){activeSession.exercises.splice(ei,1);renderWorkout();};
window.skipToNext=async function(){
  // Advance cycle without saving a workout
  const cur=activeSession?.cycleDay||4;
  const nextDay=cur>=4?1:cur+1;
  const tmpl=TEMPLATES.find(t=>t.cycleDay===nextDay)||TEMPLATES[0];
  activeSession={date:TODAY,cycleDay:tmpl.cycleDay,name:tmpl.label,notes:'',
    exercises:tmpl.exercises.map(te=>{
      const exInfo=EX_LIB[te.code]||{name:te.code,type:'sets'};
      return {code:te.code,name:exInfo.name,type:exInfo.type,cue:exInfo.cue,sets:te.sets.map(s=>({...s}))};
    })
  };
  renderWorkoutForm(tmpl,null);
};

window.saveWorkout=async function(){
  if(!activeSession||activeSession.cycleDay===4)return;
  activeSession.notes=document.getElementById('sessNotes')?.value||'';
  // sync any edited values from inputs
  document.querySelectorAll('.sel-ex').forEach((block,ei)=>{
    if(!activeSession.exercises[ei])return;
    block.querySelectorAll('.set-row').forEach((row,si)=>{
      const inputs=row.querySelectorAll('input');
      if(activeSession.exercises[ei].type==='duration'){
        if(inputs[0])activeSession.exercises[ei].sets[si]={mins:+inputs[0].value||0};
      } else {
        if(inputs[0])activeSession.exercises[ei].sets[si].reps=+inputs[0].value||0;
        if(inputs[1])activeSession.exercises[ei].sets[si].weight=+inputs[1].value||0;
      }
    });
  });
  // PR check
  const prs=(await fbGet(uk('prs')))||{};
  let newPRs=[];
  activeSession.exercises.forEach(ex=>{
    if(ex.type==='sets'){
      const best=ex.sets.reduce((m,s)=>Math.max(m,+s.weight||0),0);
      if(best>0&&best>(prs[ex.code]||0)){prs[ex.code]=best;newPRs.push(`${ex.name}: ${best} lbs`);}
    }
  });
  if(newPRs.length)await fbSet(uk('prs'),prs);
  // Auto-update template weights for next same-day session (progressive overload)
  // (user can override — these just seed the next session's pre-fill)
  const session={...activeSession,savedAt:new Date().toISOString(),newPRs,user:getUser().name};
  await fbPush(uk('workouts'),session);
  // Show confirmation + instant AI comparison
  const el=document.getElementById('view-workout');
  const totalVol=activeSession.exercises.filter(e=>e.type==='sets').reduce((t,e)=>t+calcVol(e),0);
  el.innerHTML=`
  <div class="panel">
    <h2>✓ SESSION SAVED & SYNCED</h2>
    <div class="grid" style="margin-bottom:12px">
      <div class="stat"><div class="lab">Cycle Day</div><div class="val">${activeSession.cycleDay}</div></div>
      <div class="stat"><div class="lab">Session</div><div class="val" style="font-size:13px">${activeSession.name}</div></div>
      <div class="stat"><div class="lab">Total Volume</div><div class="val good">${totalVol.toLocaleString()} <small style="font-size:10px">lbs</small></div></div>
    </div>
    ${newPRs.length?`<div class="note ok">🏆 NEW PR! ${newPRs.join(' · ')}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn" onclick="renderWorkout()">NEXT SESSION</button>
      <button class="btn ghost sm" onclick="getSessionComparison()">📊 AI COMPARISON</button>
      <button class="btn ghost sm" onclick="show('history');renderHistory()">HISTORY</button>
    </div>
    <div id="comparisonEl" style="margin-top:12px"></div>
  </div>`;
  activeSession=null;
};

window.getSessionComparison=async function(){
  const el=document.getElementById('comparisonEl');
  if(!el)return;
  el.innerHTML=`<div class="ai-thinking">Analysing vs your last session…</div>`;
  const data=await fbGet(uk('workouts'));
  if(!data){el.innerHTML='<p style="color:var(--faint)">No history to compare yet.</p>';return;}
  const sessions=Object.values(data).sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
  const lastTwo=sessions.slice(0,2);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:600,
        system:`You are a gym coach. Compare two workout sessions and give 3–4 specific bullet points. Be direct and numerical. Format: use • bullets, ALL CAPS for headers, no markdown.`,
        messages:[{role:'user',content:`Compare these two sessions for ${getUser().name}:\n\nMOST RECENT:\n${JSON.stringify(lastTwo[0],null,2)}\n\nPREVIOUS:\n${JSON.stringify(lastTwo[1],null,2)}\n\nGive: volume comparison, exercises where weight increased/decreased, one specific recommendation for next session.`}]
      })
    });
    const d=await resp.json();
    const text=d.content?.[0]?.text||'Could not analyse.';
    el.innerHTML=`<div class="ai-label">SESSION COMPARISON</div><div class="ai-bubble">${text.replace(/</g,'&lt;')}</div>`;
  }catch(e){el.innerHTML=`<div class="note">Could not reach AI. Check connection.</div>`;}
};

async function renderHistory(){
  const el=document.getElementById('view-history');
  el.innerHTML=`<div class="panel"><h2>LOADING HISTORY…</h2><div class="ai-thinking">Fetching from Firebase…</div></div>`;
  const data=await fbGet(uk('workouts'));
  if(!data){el.innerHTML=`<div class="panel"><h2>WORKOUT HISTORY</h2><p style="color:var(--faint)">No workouts yet.</p></div>`;return;}
  const workouts=Object.entries(data).map(([id,w])=>({id,...w})).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const cards=workouts.map(w=>{
    const d=new Date(w.date+'T12:00:00');
    const totalVol=w.exercises?.filter(e=>e.type==='sets').reduce((t,e)=>t+calcVol(e),0)||0;
    const totalMins=w.exercises?.filter(e=>e.type==='duration').reduce((t,e)=>t+calcVol(e),0)||0;
    const exList=(w.exercises||[]).map(e=>{
      if(e.type==='sets'){const ss=e.sets.map(s=>`${s.reps||'?'}×${s.weight||'?'}lbs`).join(', ');return `<div class="wlog-ex">${e.code} ${e.name}: ${ss}</div>`;}
      if(e.type==='duration')return `<div class="wlog-ex">${e.code} ${e.name}: ${e.sets[0]?.mins||'?'} min</div>`;
      return `<div class="wlog-ex">${e.code} ${e.name}: ${e.sets[0]?.secs||'?'} sec</div>`;
    }).join('');
    return `<div class="wlog-entry">
      <div class="wlog-date">${DAYNAMES[d.getDay()].toUpperCase()} · ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      <div class="wlog-name">${w.name||'Workout'} ${w.newPRs?.length?`<span class="pr-badge">🏆 PR</span>`:''}</div>
      ${exList}
      ${w.notes?`<div class="wlog-ex" style="color:var(--faint);font-style:italic;margin-top:3px">"${w.notes}"</div>`:''}
      <div class="wlog-vol">${totalVol?`Vol: <b style="color:var(--ink)">${totalVol.toLocaleString()} lbs</b>`:''} ${totalMins?` · Cardio: <b style="color:var(--ink)">${totalMins} min</b>`:''}</div>
      <div style="margin-top:7px"><button class="btn danger sm" onclick="delWorkout('${w.id}')">DELETE</button></div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="panel"><h2>WORKOUT HISTORY — ${getUser().name.toUpperCase()}</h2><p style="color:var(--faint);margin-bottom:12px">${workouts.length} sessions</p>${cards}</div>`;
}

const MFIELDS=[
  {k:'weight',lab:'Weight',unit:'lbs'},
  {k:'waist',lab:'Waist',unit:'in'},
  {k:'chest',lab:'Chest',unit:'in'},
  {k:'hips',lab:'Hips',unit:'in'},

async function renderMeasurements(){
  const el=document.getElementById('view-measurements');
  el.innerHTML=`<div class="panel"><h2>BODY MEASUREMENTS</h2><div class="ai-thinking">Loading…</div></div>`;
  const data=await fbGet(uk('measurements'))||{};
  const logs=Object.entries(data).map(([id,m])=>({id,...m})).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const last=logs[0]||null;const prev=logs[1]||null;
  const histRows=logs.slice(0,8).map(m=>{
    const d=new Date(m.date+'T12:00:00');
    return `<tr><td>${d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}</td>${MFIELDS.map(f=>m[f.k]?`<td>${m[f.k]} ${f.unit}</td>`:'<td style="color:var(--faint)">—</td>').join('')}</tr>`;
  }).join('');
  const compareRows=last?MFIELDS.map(f=>{
    const cur=last[f.k];const p=prev?.[f.k];if(!cur)return'';
    const delta=p?(cur-p).toFixed(1):null;
    const good=f.k==='waist'?delta<0:delta>0;
    return `<div class="mrow"><div class="mlabel">${f.lab}</div>
      <div class="mval">${cur} <span style="font-size:10px;color:var(--faint)">${f.unit}</span></div>
      ${delta!==null?`<span class="${good?'good':'mid'}" style="font-size:11px">${delta>0?'+':''}${delta} ${f.unit} vs prev</span>`:''}
    </div>`;
  }).join(''):'';
  el.innerHTML=`
  <div class="panel"><h2>LOG MEASUREMENTS — ${getUser().name.toUpperCase()}</h2>

      <div class="stat"><div class="lab">Date</div><input type="date" id="mDate" value="${TODAY}"></div>

${measSummary||'None logged.'}

${sleepSummary||'None logged.'}

--- TODAY'S NUTRITION ---
${dietToday.length?dietToday.map(f=>`${f.n}(${f.cal}kcal P:${f.p}g)`).join(', '):'Nothing logged today.'}

Today: ${TODAY}`;

  respEl.innerHTML=`<div class="ai-label">AI COACH</div><div class="ai-thinking">Analysing your data…</div>`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',

    respEl.innerHTML=`<div class="note">⚠ Could not reach AI coach. Check your connection and try again.</div>`;
  }
};

// ── WEEKLY PLAN ───────────────────────────────────────────────────────────────
async function renderPlan(){
  const el=document.getElementById('view-plan');
  const data=await fbGet(uk('workouts'))||{};
  const workouts=Object.values(data);
  const todayName=DAYNAMES[new Date().getDay()];
  const plan=[
    {day:'Monday',focus:'Chest & Triceps',icon:'🔴'},
    {day:'Tuesday',focus:'Back & Biceps',icon:'🔵'},
    {day:'Wednesday',focus:'Shoulders & Arms',icon:'🟡'},
    {day:'Thursday',focus:'Legs',icon:'🟢'},
    {day:'Friday',focus:'Core & Cardio',icon:'🟠'},
    {day:'Saturday',focus:'Full Body / Active Recovery',icon:'⚫'},
    {day:'Sunday',focus:'REST',icon:'💤'},
  ];
  const rows=plan.map(p=>{
    const isToday=p.day===todayName;
    const done=workouts.some(w=>{const d=new Date(w.date+'T12:00:00');return DAYNAMES[d.getDay()]===p.day&&(Date.now()-d)<8*24*3600*1000;});
    return `<div style="display:flex;align-items:center;gap:11px;padding:11px 13px;background:${isToday?'#192819':'var(--panel2)'};border:1px solid ${isToday?'var(--accent)':'var(--line)'};border-radius:var(--radius);margin-bottom:7px">
      <div style="font-size:18px">${p.icon}</div>
      <div style="flex:1">
        <div style="font-size:10px;color:${isToday?'var(--accent)':'var(--dim)'};font-weight:${isToday?700:400};letter-spacing:1px">${p.day.toUpperCase()}${isToday?' — TODAY':''}</div>
        <div style="font-size:12px;color:var(--ink);margin-top:2px">${p.focus}</div>
      </div>
      ${done?`<div style="color:var(--accent);font-size:12px">✓ DONE</div>`:p.focus==='REST'?'':'<div style="color:var(--faint);font-size:11px">PENDING</div>'}
    </div>`;
  }).join('');
  el.innerHTML=`<div class="panel"><h2>WEEKLY PLAN</h2>
    <p style="color:var(--faint);margin-bottom:12px">6-day split. Ask the AI Coach to customise this based on your goals.</p>
    ${rows}
    <div style="margin-top:12px"><button class="btn ghost sm" onclick="quickCoach('design me a customised weekly training plan based on my workout history, current PRs, and any muscle groups I have been neglecting');show('coach')">AI: CUSTOMISE MY PLAN</button></div>
  </div>`;
}

// ── ASSESSMENT (from ENDURANCE_OS) ────────────────────────────────────────────
const Q_SHARED=[
  {k:'train',q:'How often do you currently exercise?',opts:['Rarely/never','1–2× per week','3–4× per week','5+ per week'],w:[0,1,2,3],cat:'body'},
  {k:'cardio',q:'Climbing 3 flights of stairs leaves you…',opts:['Badly out of breath','Breathing hard','Slightly winded','Totally fine'],w:[0,1,2,3],cat:'body'},
  {k:'sleep',q:'Average sleep per night?',opts:['Under 5.5 hrs','5.5–6.5 hrs','6.5–7.5 hrs','7.5+ hrs'],w:[0,1,2,3],cat:'recovery'},
  {k:'stress',q:'Your stress level most days?',opts:['Very high','High','Moderate','Low'],w:[0,1,2,3],cat:'recovery'},
  {k:'smoke',q:'Smoking / vaping?',opts:['Daily','Occasionally','Quit recently','Never'],w:[0,1,2,3],cat:'habits'},
  {k:'diet',q:'How would you rate your diet?',opts:['Mostly fast food','Mixed, lots of sugar','Decent, some junk','Clean most days'],w:[0,1,2,3],cat:'habits'},
];
const Q_M=[
  {k:'stam',q:'In bed, how long do you typically last before climax?',opts:['Under 2 min','2–5 min','5–10 min','10+ min'],w:[0,1,2,3],cat:'stamina'},
  {k:'control',q:'Can you feel climax approaching early enough to slow down?',opts:['No','Sometimes, too late','Usually','Yes, reliably'],w:[0,1,2,3],cat:'stamina'},
  {k:'erect',q:'Erection firmness / reliability?',opts:['Often a problem','Inconsistent','Mostly fine','Strong'],w:[0,1,2,3],cat:'stamina'},
  {k:'goal',q:'Primary goal for 8 weeks?',opts:['Last longer in bed','Build strength & shape','Energy + health','All of it'],w:[0,0,0,0],cat:'goal'},
];
const Q_F=[
  {k:'arousal',q:'How easy is it for you to feel sexually aroused?',opts:['Very difficult','Sometimes, takes long','Usually','Easily and reliably'],w:[0,1,2,3],cat:'stamina'},
  {k:'orgasm',q:'How often do you reach orgasm during partnered sex?',opts:['Rarely/never','Sometimes','Usually','Almost always'],w:[0,1,2,3],cat:'stamina'},
  {k:'cycle',q:'How regular and comfortable is your menstrual cycle?',opts:['Very irregular/painful','Irregular/moderate pain','Mostly regular','Regular and comfortable'],w:[0,1,2,3],cat:'recovery'},
  {k:'goal',q:'Primary goal for 8 weeks?',opts:['Better arousal & sensation','Build strength & shape','Energy + health','All of it'],w:[0,0,0,0],cat:'goal'},
];

let aStep=0,aAnswers={};
const STEP_G=0,STEP_P=1,STEP_Q=2;

async function renderAssess(){
  const el=document.getElementById('view-assess');
  const prof=await fbGet(uk('profile'))||{};
  const hasProfile=prof.gender&&prof.age;
  el.innerHTML=`<div class="panel">
    <h2>ASSESSMENT — ${getUser().name.toUpperCase()}</h2>
    ${hasProfile?`<div class="note ok">Profile saved. Gender: ${prof.gender}, Age: ${prof.age}. <button class="btn ghost sm" style="margin-left:8px" onclick="startAssessment()">RETAKE</button></div>`:''}
    <div class="bar" style="margin-top:12px"><i id="abar" style="width:0%"></i></div>
    <div id="assessPanel"></div>
  </div>`;
  aStep=STEP_G;aAnswers={};
  renderAssessStep(prof);
}

async function renderAssessStep(prof={}){
  const qs=[...Q_SHARED,...((prof.gender||getUser().gender)==='F'?Q_F:Q_M)];
  const total=qs.length+2;
  document.getElementById('abar').style.width=(aStep/total*100)+'%';
  const ap=document.getElementById('assessPanel');
  if(aStep===STEP_G){
    ap.innerHTML=`<div class="q-num">STEP 1 — BIOLOGICAL SEX</div>
      <div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap">
        <button class="gbtn${prof.gender==='M'?' sel':''}" id="gbM" onclick="pickG('M')"><span class="gicon">♂</span>MALE</button>
        <button class="gbtn${prof.gender==='F'?' sel':''}" id="gbF" onclick="pickG('F')"><span class="gicon">♀</span>FEMALE</button>
      </div>
      <button class="btn" onclick="nextAssess()">NEXT →</button>`;
  } else if(aStep===STEP_P){
    ap.innerHTML=`<div class="q-num">STEP 2 — YOUR NUMBERS</div>
      <div class="grid3" style="margin:12px 0">
        <div class="stat"><div class="lab">Age</div><input type="number" id="aAge" min="18" max="90" value="${prof.age||''}"></div>
        <div class="stat"><div class="lab">Height (cm)</div><input type="number" id="aHeight" min="140" max="220" value="${prof.height||''}"></div>
        <div class="stat"><div class="lab">Weight (lbs)</div><input type="number" id="aWeight" min="66" max="550" value="${prof.weight||''}"></div>
      </div>
      <div id="aErr" style="color:var(--bad);font-size:11px;margin-bottom:8px"></div>
      <div style="display:flex;gap:7px">
        <button class="btn" onclick="nextAssess()">NEXT →</button>
        <button class="btn ghost sm" onclick="aStep=STEP_G;renderAssessStep()">← BACK</button>
      </div>`;
  } else {
    const qi=aStep-STEP_Q;const q=qs[qi];
    ap.innerHTML=`<div class="q-num">QUESTION ${qi+1} / ${qs.length}</div>
      <div class="q-text">${q.q}</div>`+
      q.opts.map((o,i)=>`<button class="opt" onclick="answerA(${i})">${o}</button>`).join('');
  }
}

window.pickG=function(g){
  document.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('gb'+g)?.classList.add('sel');
  getUser().gender=g;
};
window.nextAssess=async function(){
  if(aStep===STEP_G){
    const g=getUser().gender;if(!g){alert('Select one.');return;}
    const prof=await fbGet(uk('profile'))||{};
    await fbSet(uk('profile'),{...prof,gender:g});
    aStep=STEP_P;renderAssessStep({...prof,gender:g});
  } else if(aStep===STEP_P){
    const age=+document.getElementById('aAge')?.value;
    const height=+document.getElementById('aHeight')?.value;
    const weight=+document.getElementById('aWeight')?.value;
    if(!age||!height||!weight){document.getElementById('aErr').textContent='Fill all fields.';return;}
    const prof=await fbGet(uk('profile'))||{};
    const updated={...prof,age,height,weight};
    await fbSet(uk('profile'),updated);
    aStep=STEP_Q;renderAssessStep(updated);
  }
};
window.answerA=async function(i){
  const prof=await fbGet(uk('profile'))||{};
  const qs=[...Q_SHARED,...(prof.gender==='F'?Q_F:Q_M)];
  const qi=aStep-STEP_Q;const q=qs[qi];
  aAnswers[q.k]={i,w:q.w[i],cat:q.cat};aStep++;
  if(aStep-STEP_Q<qs.length){renderAssessStep(prof);}
  else {
    await fbSet(uk('answers'),aAnswers);
    const ap=document.getElementById('assessPanel');
    document.getElementById('abar').style.width='100%';
    ap.innerHTML=`<div class="note ok" style="margin-top:12px">✓ Assessment complete and saved to Firebase. Go to AI COACH and ask for your personalised plan.</div>
      <div style="margin-top:10px"><button class="btn ghost sm" onclick="quickCoach('based on my assessment answers and profile, give me a personalised 8-week plan for stamina, body composition, and overall performance');show('coach')">GET MY AI PLAN</button></div>`;
  }
};
window.startAssessment=function(){aStep=STEP_G;aAnswers={};renderAssessStep({});};

// ── NAV ───────────────────────────────────────────────────────────────────────
const VIEWS=['workout','history','prs','measurements','nutrition','sleep','coach','plan','assess'];
function show(v){
  VIEWS.forEach(x=>{
    document.getElementById('view-'+x)?.classList.toggle('hidden',x!==v);
    const t=document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));
    if(t)t.classList.toggle('active',x===v);
  });
  if(v==='history')renderHistory();
  else if(v==='prs')renderPRs();
  else if(v==='measurements')renderMeasurements();
  else if(v==='nutrition')renderNutrition();
  else if(v==='sleep')renderSleep();
  else if(v==='coach')renderCoach();
  else if(v==='plan')renderPlan();
  else if(v==='assess')renderAssess();
}

document.getElementById('googleSignInBtn').addEventListener('click', signIn);
document.getElementById('signOutBtn').addEventListener('click', signOut);
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>show(t.dataset.view)));

// Auth state listener above handles boot — show login screen initially
setSyncStatus('loading');
document.getElementById('view-users').classList.add('hidden');
document.getElementById('view-app').classList.add('hidden');
</script>
